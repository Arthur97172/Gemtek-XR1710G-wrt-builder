name: Build Airoha_an7581-Wrt

permissions:
  contents: write
  actions: write

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      ssh:
        description: 'SSH connection to Actions'
        required: false
        default: 'false'
      target:
        description: 'Select which distro to build'
        required: true
        type: choice
        options:
          - istoreos
          - openwrt
          - immortalwrt
        default: immortalwrt
      ipaddr:
        description: "请设置软路由的管理地址,格式:192.168.x.1"
        required: true
        default: "192.168.1.1"
        
env:
  ARCHITECTURE: xr1710g
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  WRT_NAME: ${{ (inputs.target == 'openwrt') && 'OpenWrt' || (inputs.target == 'istoreos') && 'iStoreOS' || 'ImmortalWrt' }}
  TZ: Asia/Shanghai
  DIY_P2_DIR: diy-part2.d
  TARGET: ${{ github.event.inputs.target }}

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: 服务器信息
      run: |
        echo "------------------------------- CPU -------------------------------"
        echo "物理数量: $(cat /proc/cpuinfo| grep 'physical id'| sort| uniq| wc -l)"
        echo "型号: $(cat /proc/cpuinfo | grep name | cut -f2 -d: | uniq -c | xargs)"
        echo "------------------------------- 内存 -------------------------------"
        sudo lshw -short -C memory | grep GiB
        echo "------------------------------- 磁盘 -------------------------------"
        df -Th

    - name: 初始化编译环境
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /etc/mysql /etc/php \
          /usr/local/lib/android /opt/ghc
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install $(cat $GITHUB_WORKSPACE/depends/ubuntu-22.04)
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir

    - name: 配置custom IP 信息
      run: |
        CONFIG_PATH="./files/etc/uci-defaults/99-custom.sh"
        echo "当前网络配置路径: $CONFIG_PATH"
        sed -i "s/__IPADDR__/${{ inputs.ipaddr }}/g" "$CONFIG_PATH"
        sed -i "s/WRTVERSIONINFO/${{ env.WRT_NAME }}/g" "$CONFIG_PATH"
        sed -i "s/VERXXXX/25.10/g" "$CONFIG_PATH"
        echo "✅ 配置修改完成，输出预览："
        cat "$CONFIG_PATH"

    - name: 克隆源码 — ImmortalWrt
      if: ${{ env.TARGET == 'immortalwrt' }}
      env:
        REPO_URL: https://github.com/naoki66/ImmortalWrt-for-Gemtek-XR1710G
        REPO_BRANCH: master
      run: |
        df -hT $PWD
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        chmod -R +x openwrt/
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

    - name: 克隆源码 — OpenWrt
      if: ${{ env.TARGET == 'openwrt' }}
      env:
        REPO_URL: https://github.com/YYH2913/openwrt
        REPO_BRANCH: xr1710g-6.18-integration
      run: |
        df -hT $PWD
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        chmod -R +x openwrt/
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

    - name: 克隆源码 — iStoreOS
      if: ${{ env.TARGET == 'istoreos' }}
      env:
        REPO_URL: https://github.com/hx801217/istoreos
        REPO_BRANCH: istoreos-24.10
      run: |
        df -hT $PWD
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        chmod -R +x openwrt/
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

    - name: 缓存构建动作
      uses: klever1988/cachewrtbuild@main
      with:
        ccache: 'true'
        mixkey: ubuntu-22.04-${{ env.ARCHITECTURE }}-${{ env.TARGET }}-v4
        prefix: ${{ github.workspace }}/openwrt

    - name: 加载 99-custom.sh 配置
      run: |
        cp files/etc/uci-defaults/99-custom.sh openwrt/target/linux/airoha/an7581/base-files/etc/uci-defaults/
        echo "✅ 文件准备完成"

    - name: 加载 feeds 配置 — iStoreOS
      if: ${{ env.TARGET == 'istoreos' }}
      run: cp feeds.d/istoreos openwrt/feeds.conf

    - name: 加载 feeds 配置 — OpenWrt
      if: ${{ env.TARGET == 'openwrt' }}
      run: cp feeds.d/openwrt openwrt/feeds.conf

    - name: 加载 feeds 配置 — ImmortalWrt
      if: ${{ env.TARGET == 'immortalwrt' }}
      run: cp feeds.d/immortalwrt openwrt/feeds.conf

    - name: DIY part1 — 版本号
      run: |
        chmod +x scripts/diy-part1.sh
        cd openwrt && "$GITHUB_WORKSPACE/scripts/diy-part1.sh"

    - name: 更新 feeds
      run: cd openwrt && ./scripts/feeds update -a

    - name: 安装 feeds
      run: cd openwrt && ./scripts/feeds install -a

    - name: 加载配置 — iStoreOS
      if: ${{ env.TARGET == 'istoreos' }}
      run: cp configs/istoreos.config openwrt/.config

    - name: 加载配置 — OpenWrt
      if: ${{ env.TARGET == 'openwrt' }}
      run: cp configs/openwrt.config openwrt/.config

    - name: 加载配置 — ImmortalWrt
      if: ${{ env.TARGET == 'immortalwrt' }}
      run: cp configs/immortalwrt.config openwrt/.config

    - name: DIY part2 — iStoreOS
      if: ${{ env.TARGET == 'istoreos' }}
      run: |
        chmod +x "$DIY_P2_DIR/istoreos.sh"
        cd openwrt && "$GITHUB_WORKSPACE/$DIY_P2_DIR/istoreos.sh"

    - name: DIY part2 — OpenWrt
      if: ${{ env.TARGET == 'openwrt' }}
      run: |
        chmod +x "$DIY_P2_DIR/openwrt.sh"
        cd openwrt && "$GITHUB_WORKSPACE/$DIY_P2_DIR/openwrt.sh"

    - name: DIY part2 — ImmortalWrt
      if: ${{ env.TARGET == 'immortalwrt' }}
      run: |
        chmod +x patch/178-01-net-airoha-Implement-HW-GRO-TCP-support.patch
        cp patch/178-01-net-airoha-Implement-HW-GRO-TCP-support.patch openwrt/target/linux/airoha/patches-6.18/
        chmod +x "$DIY_P2_DIR/immortalwrt.sh"
        cd openwrt && "$GITHUB_WORKSPACE/$DIY_P2_DIR/immortalwrt.sh"

    - name: SSH
      uses: P3TERX/ssh2actions@v1.0.0
      if: ${{ github.event.inputs.ssh == 'true' }}
      env:
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

    - name: 下载软件包
      id: package
      run: |
        cd openwrt
        make defconfig
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: 编译固件
      id: compile
      run: |
        cd openwrt
        echo "$(nproc) thread compile"
        make defconfig
        if ! make olddefconfig; then
          yes "" | make oldconfig
        fi
        make -j$(nproc) || make -j1 || make -j1 V=s
        # 去掉了 %H%M，仅保留年月日
        echo "FILE_DATE=_$(date +'%Y%m%d')" >> $GITHUB_ENV
        echo "COMPILED=true" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 磁盘空间
      if: (!cancelled())
      run: df -hT

    - name: 上传 bin 目录
      uses: actions/upload-artifact@v4
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true'
      with:
        name: OpenWrt_bin_${{ env.TARGET }}${{ env.FILE_DATE }}
        path: openwrt/bin

    - name: 整理固件
      id: organize
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        shopt -s globstar nullglob

        # 1. 专门针对包含 snapshot 的文件进行精准改名
        for f in **/*; do
          [ -f "$f" ] || continue
          # 检查文件名中是否包含 -snapshot-
          if [[ "$f" == *"-snapshot-"* ]]; then
            # 动态替换去掉 -snapshot-开头的两段随机字符（即 -snapshot-rXXXXX-XXXXXXXX）
            new_f=$(echo "$f" | sed -r 's/-snapshot-[^-]+-[^-]+//')
            mv "$f" "$new_f"
          fi
        done

        # 2. 保留改名后的核心固件和配置文件，删掉其余无用文件
        for f in **/*; do
          [ -f "$f" ] || continue
          case "$f" in
            config.buildinfo|\
            *w1700k-ubi-initramfs-recovery.itb|\
            *w1700k-ubi-squashfs-sysupgrade.itb|\
            *xr1710g-ubi-initramfs-recovery.itb|\
            *xr1710g-ubi-squashfs-sysupgrade.itb) continue ;;
            *) rm -f "$f" ;;
          esac
        done

        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 生成发布标签
      id: tag
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_RELEASE == 'true' && !cancelled()
      run: |
        # 仅保留年月日作为标签
        echo "release_tag=$(date +'%Y.%m.%d')" >> $GITHUB_OUTPUT
        
        # 转换发行版显示名称
        TARGET_ENV="${{ env.TARGET }}"
        if [ "$TARGET_ENV" = "istoreos" ]; then
          DISTRO_NAME="iStoreOS"
          PASSWORD_INFO="password"
        elif [ "$TARGET_ENV" = "openwrt" ]; then
          DISTRO_NAME="OpenWrt"
          PASSWORD_INFO="password"
        else
          DISTRO_NAME="ImmortalWrt"
          PASSWORD_INFO="无密码（首次直接按 Enter 登录）"
        fi

        # 写入发行说明文件
        printf '%s\n' \
          "设备: XR1710G (Airoha AN7581)" \
          "发行版: $DISTRO_NAME" \
          "编译时间: $(date +'%Y年%m月%d日')" \
          "登录IP: ${{ inputs.ipaddr }}" \
          "用户名: root" \
          "密码: $PASSWORD_INFO" > release.txt

        echo "status=success" >> $GITHUB_OUTPUT

    - name: 发布到 Releases
      uses: softprops/action-gh-release@v2
      if: steps.tag.outputs.status == 'success' && !cancelled()
      with:
        tag_name: ${{ env.TARGET }}_${{ steps.tag.outputs.release_tag }}
        name: ${{ env.TARGET == 'istoreos' && 'iStoreOS' || (env.TARGET == 'openwrt' && 'OpenWrt' || 'ImmortalWrt') }} ${{ steps.tag.outputs.release_tag }}
        body_path: release.txt
        files: ${{ env.FIRMWARE }}/*

    - name: 清理运行记录
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh run list --workflow="Build Airoha_an7581-Wrt" --limit 30 --json databaseId --jq '.[].databaseId' | \
          tail -n +2 | xargs -I {} gh run delete {} --yes || true

    - name: 清理旧 Release
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release list --limit 100 --json tagName,publishedAt --jq '.[] | "\(.tagName)"' | \
          grep "^${{ env.TARGET }}_" | \
          tail -n +5 | \
          xargs -I {} gh release delete {} --yes --cleanup-tag || true
