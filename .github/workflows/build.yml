name: Build Airoha_an7581-Wrt

permissions:
  contents: write
  actions: write

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      ssh:
        description: 'SSH connection to Actions'
        required: false
        default: 'false'
      target:
        description: 'Select which distro to build'
        required: true
        type: choice
        options:
          - istoreos
          - openwrt
          - immortalwrt
        default: immortalwrt
      lan_ip_preset:
        description: 'LAN IP preset (used when custom is not selected)'
        required: false
        type: choice
        options:
          - custom
          - 192.168.10.1
          - 192.168.100.1  # iStoreOS 旧默认
          - 192.168.1.1    # OpenWrt/ImmortalWrt 默认
          - 192.168.0.1    # 常见地址
          - 10.0.0.1       # A 类私有
          - 172.16.0.1     # B 类私有
        default: 192.168.10.1
      lan_ip_custom:
        description: 'Custom LAN IP (only effective when preset is custom)'
        required: false
        default: '192.168.5.1'
  schedule:
   - cron: 0 16 * * *

env:
  ARCHITECTURE: xr1710g
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai
  DIY_P2_DIR: diy-part2.d
  TARGET: ${{ github.event.inputs.target }}
  REPO_URL: ${{ github.event.inputs.target == 'istoreos' && 'https://github.com/hx801217/istoreos' || (github.event.inputs.target == 'immortalwrt' && 'https://github.com/lvcdy/openwrt_xr1710g' || 'https://github.com/lvcdy/openwrt_xr1710g') }}
  REPO_BRANCH: ${{ github.event.inputs.target == 'istoreos' && 'istoreos-24.10' || (github.event.inputs.target == 'immortalwrt' && 'main' || 'main') }}

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: 服务器信息
      run: |
        echo "------------------------------- CPU -------------------------------"
        echo "物理数量: $(cat /proc/cpuinfo| grep 'physical id'| sort| uniq| wc -l)"
        echo "型号: $(cat /proc/cpuinfo | grep name | cut -f2 -d: | uniq -c | xargs)"
        echo "------------------------------- 内存 -------------------------------"
        sudo lshw -short -C memory | grep GiB
        echo "------------------------------- 磁盘 -------------------------------"
        df -Th

    - name: 初始化编译环境
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /etc/mysql /etc/php \
          /usr/local/lib/android /opt/ghc
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install $(cat $GITHUB_WORKSPACE/depends/ubuntu-22.04)
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir

    - name: 克隆源码 — ImmortalWrt
      if: ${{ env.TARGET == 'immortalwrt' }}
      env:
        REPO_URL: https://github.com/lvcdy/openwrt_xr1710g
        REPO_BRANCH: main
      run: |
        df -hT $PWD
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

    - name: 克隆源码 — OpenWrt
      if: ${{ env.TARGET == 'openwrt' }}
      env:
        REPO_URL: https://github.com/lvcdy/openwrt_xr1710g
        REPO_BRANCH: main
      run: |
        df -hT $PWD
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

    - name: 克隆源码 — iStoreOS
      if: ${{ env.TARGET == 'istoreos' }}
      env:
        REPO_URL: https://github.com/hx801217/istoreos
        REPO_BRANCH: istoreos-24.10
      run: |
        df -hT $PWD
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

    - name: 缓存构建动作
      uses: klever1988/cachewrtbuild@main
      with:
        ccache: 'true'
        mixkey: ubuntu-22.04-${{ env.ARCHITECTURE }}-${{ env.TARGET }}-v4
        prefix: ${{ github.workspace }}/openwrt

    - name: 加载 feeds 配置 — iStoreOS
      if: ${{ env.TARGET == 'istoreos' }}
      run: cp feeds.d/istoreos openwrt/feeds.conf

    - name: 加载 feeds 配置 — OpenWrt
      if: ${{ env.TARGET == 'openwrt' }}
      run: cp feeds.d/openwrt openwrt/feeds.conf

    - name: 加载 feeds 配置 — ImmortalWrt
      if: ${{ env.TARGET == 'immortalwrt' }}
      run: cp feeds.d/immortalwrt openwrt/feeds.conf

    - name: DIY part1 — 版本号
      run: |
        chmod +x scripts/diy-part1.sh
        cd openwrt && "$GITHUB_WORKSPACE/scripts/diy-part1.sh"

    - name: 更新 feeds
      run: cd openwrt && ./scripts/feeds update -a

    - name: 安装 feeds
      run: cd openwrt && ./scripts/feeds install -a

    - name: 加载配置 — iStoreOS
      if: ${{ env.TARGET == 'istoreos' }}
      run: cp configs/istoreos.config openwrt/.config

    - name: 加载配置 — OpenWrt
      if: ${{ env.TARGET == 'openwrt' }}
      run: cp configs/openwrt.config openwrt/.config

    - name: 加载配置 — ImmortalWrt
      if: ${{ env.TARGET == 'immortalwrt' }}
      run: cp configs/immortalwrt.config openwrt/.config

    - name: DIY part2 — iStoreOS
      if: ${{ env.TARGET == 'istoreos' }}
      env:
        DEFAULT_LAN_IP: ${{ github.event.inputs.lan_ip_preset == 'custom' && github.event.inputs.lan_ip_custom || github.event.inputs.lan_ip_preset }}
        DISTRO_FILES: files/istoreos
      run: |
        chmod +x "$DIY_P2_DIR/istoreos.sh"
        cd openwrt && "$GITHUB_WORKSPACE/$DIY_P2_DIR/istoreos.sh"

    - name: DIY part2 — OpenWrt
      if: ${{ env.TARGET == 'openwrt' }}
      env:
        DEFAULT_LAN_IP: ${{ github.event.inputs.lan_ip_preset == 'custom' && github.event.inputs.lan_ip_custom || github.event.inputs.lan_ip_preset }}
        DISTRO_FILES: files/openwrt
      run: |
        chmod +x "$DIY_P2_DIR/openwrt.sh"
        cd openwrt && "$GITHUB_WORKSPACE/$DIY_P2_DIR/openwrt.sh"

    - name: DIY part2 — ImmortalWrt
      if: ${{ env.TARGET == 'immortalwrt' }}
      env:
        DEFAULT_LAN_IP: ${{ github.event.inputs.lan_ip_preset == 'custom' && github.event.inputs.lan_ip_custom || github.event.inputs.lan_ip_preset }}
        DISTRO_FILES: files/immortalwrt
      run: |
        chmod +x "$DIY_P2_DIR/immortalwrt.sh"
        cd openwrt && "$GITHUB_WORKSPACE/$DIY_P2_DIR/immortalwrt.sh"

    - name: SSH
      uses: P3TERX/ssh2actions@v1.0.0
      if: ${{ github.event.inputs.ssh == 'true' }}
      env:
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

    - name: 下载软件包
      id: package
      run: |
        cd openwrt
        make defconfig
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: 编译固件
      id: compile
      run: |
        cd openwrt
        echo "$(nproc) thread compile"
        make defconfig
        if ! make olddefconfig; then
          yes "" | make oldconfig
        fi
        make -j$(nproc) || make -j1 || make -j1 V=s
        echo "FILE_DATE=_$(date +'%Y%m%d%H%M')" >> $GITHUB_ENV
        echo "COMPILED=true" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 磁盘空间
      if: (!cancelled())
      run: df -hT

    - name: 上传 bin 目录
      uses: actions/upload-artifact@v4
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true'
      with:
        name: OpenWrt_bin_${{ env.TARGET }}${{ env.FILE_DATE }}
        path: openwrt/bin

    - name: 整理固件
      id: organize
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        shopt -s globstar nullglob
        for f in **/*; do
          [ -f "$f" ] || continue
          case "$f" in
            config.buildinfo|\
            *w1700k-ubi-initramfs-recovery.itb|\
            *w1700k-ubi-squashfs-sysupgrade.itb|\
            *xr1710g-ubi-initramfs-recovery.itb|\
            *xr1710g-ubi-squashfs-sysupgrade.itb) continue ;;
            *) rm -f "$f" ;;
          esac
        done
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 上传固件目录
      uses: actions/upload-artifact@v4
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: OpenWrt_firmware_${{ env.TARGET }}${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}

    - name: 生成发布标签
      id: tag
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_RELEASE == 'true' && !cancelled()
      env:
        LAN_IP: ${{ github.event.inputs.lan_ip_preset == 'custom' && github.event.inputs.lan_ip_custom || github.event.inputs.lan_ip_preset }}
      run: |
        echo "release_tag=$(date +'%Y.%m.%d-%H.%M')" >> $GITHUB_OUTPUT
        if [ "${{ env.TARGET }}" = "istoreos" ]; then
          printf '%s\n' \
            "设备: XR1710G (Airoha AN7581)" \
            "发行版: iStoreOS" \
            "源码: YYH2913/openwrt (xr1710g-6.18-integration)" \
            "分支: xr1710g-6.18-integration" \
            "编译时间: $(date +'%Y年%m月%d日%H时%M分')" \
            "默认 LAN IP: $LAN_IP" \
            "用户名: root" \
            "密码: password" > release.txt
        else
          printf '%s\n' \
            "设备: XR1710G (Airoha AN7581)" \
            "发行版: ${{ env.TARGET == 'openwrt' && 'OpenWrt' || 'ImmortalWrt' }}" \
            "源码: YYH2913/openwrt (xr1710g-6.18-integration)" \
            "分支: xr1710g-6.18-integration" \
            "编译时间: $(date +'%Y年%m月%d日%H时%M分')" \
            "默认 LAN IP: $LAN_IP" \
            "用户名: root" \
            "密码: 无密码（首次按 Enter，passwd 设新密码）" > release.txt
        fi
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 发布到 Releases
      uses: softprops/action-gh-release@v2
      if: steps.tag.outputs.status == 'success' && !cancelled()
      with:
        tag_name: ${{ env.TARGET }}_${{ steps.tag.outputs.release_tag }}
        name: ${{ env.TARGET == 'istoreos' && 'iStoreOS' || (env.TARGET == 'openwrt' && 'OpenWrt' || 'ImmortalWrt') }} ${{ steps.tag.outputs.release_tag }}
        body_path: release.txt
        files: ${{ env.FIRMWARE }}/*

    - name: 清理运行记录
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh run list --workflow="Build Airoha_an7581-Wrt" --limit 30 --json databaseId --jq '.[].databaseId' | \
          tail -n +2 | xargs -I {} gh run delete {} --yes || true

    - name: 清理旧 Release
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release list --limit 100 --json tagName,publishedAt --jq '.[] | "\(.tagName)"' | \
          grep "^${{ env.TARGET }}_" | \
          tail -n +5 | \
          xargs -I {} gh release delete {} --yes --cleanup-tag || true